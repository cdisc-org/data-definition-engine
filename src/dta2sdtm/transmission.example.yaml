                      - { unitSystem: ORIGINAL,     numResult: 9.44, unit: "10^3/uL",  refRangeLow: "4.0", refRangeHigh: "11.0", refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 9.44, unit: "10^9/L",   refRangeLow: "4.0", refRangeHigh: "11.0" }
                  - plbtid: PLAT
                    plbtnm: Platelet
                    plbtct: HEMATOLOGY
                    dtrtid: PLAT
                    dtrtnm: Platelet
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 356.17, unit: "10^3/uL", refRangeLow: "150",   refRangeHigh: "400",   refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 356.17, unit: "10^9/L",  refRangeLow: "150.0", refRangeHigh: "400.0" }

              # ── CHEMISTRY ──
              - pnlid: CHEM
                tstpnl: CHEMISTRY
                plbid: PLAB-01
                plbnam: Central Laboratory Services
                plbtyp: CENTRAL
                labTestResults:
                  - plbtid: GLUC
                    plbtnm: Glucose
                    plbtct: CHEMISTRY
                    dtrtid: GLUC
                    dtrtnm: Glucose
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    alrtlv: AMBER
                    results:
                      - { unitSystem: ORIGINAL,     charResult: AMBER, unit: mg/dL,  refRangeLow: "70",    refRangeHigh: "100",  refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           charResult: AMBER, unit: mmol/L, refRangeLow: "3.885", refRangeHigh: "5.55" }
                  - plbtid: CREAT
                    plbtnm: Creatinine
                    plbtct: CHEMISTRY
                    dtrtid: CREAT
                    dtrtnm: Creatinine
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 0.78,   unit: mg/dL,  refRangeLow: "0.7",   refRangeHigh: "1.3",    refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 68.952, unit: umol/L, refRangeLow: "61.88", refRangeHigh: "114.92" }
                  - plbtid: CHOL
                    plbtnm: Cholesterol
                    plbtct: CHEMISTRY
                    dtrtid: CHOL
                    dtrtnm: Cholesterol
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 197.22, unit: mg/dL,  refRangeLow: "125",     refRangeHigh: "200",  refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 5.108,  unit: mmol/L, refRangeLow: "3.2375",  refRangeHigh: "5.18" }
                  - plbtid: ALT
                    plbtnm: Alanine Aminotransferase
                    plbtct: CHEMISTRY
                    dtrtid: ALT
                    dtrtnm: Alanine Aminotransferase
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 33.3, unit: U/L, refRangeLow: "7",   refRangeHigh: "56",   refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 33.3, unit: U/L, refRangeLow: "7.0", refRangeHigh: "56.0" }

