# ─────────────────────────────────────────────────────────────────────────────
# Mock LAB Transmission payload — CDISC Pilot study H2Q-MC-LZZT
# Validates against dta.linkml.yaml (root class: Transmission).
#
# Values are taken verbatim from the project's generated pilot output
# (out/dta/lab_dta.csv) for two real subjects at their first collection (E1):
#   * STUDY-0001 (site 701, M, age 75)
#   * STUDY-0002 (site 702, F, age 75)
# Each subject carries a HEMATOLOGY panel (HGB, RBC, WBC, PLAT) and a CHEMISTRY
# panel (GLUC, CREAT, CHOL, ALT). HGB is linked to the vendored COSMoS
# specialization (HGBBLD); the others are intentionally UNLINKED (no
# specialization) to exercise the gap report. GLUC carries a character result
# (AMBER) to exercise charResult; CREAT/CHOL/GLUC show SI unit conversion.
#
# Validate:
#   linkml-validate -s dta.linkml.yaml -C Transmission transmission.example.yaml
# ─────────────────────────────────────────────────────────────────────────────

# Transmission (GTP header)
ltvrsn: LAB-MODEL-2.0
igvrsn: SDTMIG 3.4
fcrdtc: "2025-01-01T00:00:00"
trssid: CENTRALLAB-001
trstyp: I

subjects:

  # ════════════════════════ Subject STUDY-0001 ════════════════════════
  - studyid: H2Q-MC-LZZT
    siteid: "701"
    scrnid: SCR-0001
    asubjid: STUDY-0001
    adsex: M
    collections:
      - accsnid: ACC-0001-V1
        kitid: KIT-0001-V1
        kitdsc: Standard collection kit
        visit: E1
        visitnum: 1
        specimens:
          - lddom: LB
            specid: SPEC-0001-V1
            rcvdtc: "2025-01-02"
            spcoml: Specimen received in good condition.
            spcomi: Fasting sample per protocol.
            agespc: 75
            panels:

              # ── HEMATOLOGY ──
              - pnlid: HEM
                tstpnl: HEMATOLOGY
                plbid: PLAB-01
                plbnam: Central Laboratory Services
                plbtyp: CENTRAL
                labTestResults:
                  - plbtid: HGB
                    plbtnm: Hemoglobin
                    plbtct: HEMATOLOGY
                    dtrtid: HGB
                    dtrtnm: Hemoglobin
                    dtrtct: HEMATOLOGY
                    plbtin: Automated hematology analyzer.
                    plbtts: RESULTS REPORTED
                    plbttc: RESULTS REPORTED
                    plrtrc: Within reference range.
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    specialization: HGBBLD          # linked -> BC C64848
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 16.98, unit: g/dL, refRangeLow: "12",    refRangeHigh: "18",    refRangeDesc: "12-18",       refRangeType: NORMAL RANGE }
                      - { unitSystem: CONVENTIONAL, numResult: 16.98, unit: g/dL, refRangeLow: "12.0",  refRangeHigh: "18.0",  refRangeDesc: "12.0-18.0" }
                      - { unitSystem: SI,           numResult: 169.8, unit: g/L,  refRangeLow: "120.0", refRangeHigh: "180.0", refRangeDesc: "120.0-180.0" }
                  - plbtid: RBC
                    plbtnm: Erythrocytes
                    plbtct: HEMATOLOGY
                    dtrtid: RBC
                    dtrtnm: Erythrocytes
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
                    results:
                      - { unitSystem: ORIGINAL,     numResult: 5.29, unit: "10^6/uL",  refRangeLow: "4.0", refRangeHigh: "6.0", refRangeType: NORMAL RANGE }
                      - { unitSystem: SI,           numResult: 5.29, unit: "10^12/L",  refRangeLow: "4.0", refRangeHigh: "6.0" }
                  - plbtid: WBC
                    plbtnm: Leukocytes
                    plbtct: HEMATOLOGY
                    dtrtid: WBC
                    dtrtnm: Leukocytes
                    plbtts: RESULTS REPORTED
                    asydtc: "2025-01-03"
                    rrdtc: "2025-01-04"
                    rtrtyp: I
