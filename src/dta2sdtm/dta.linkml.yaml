    annotations: { lab_tx_var: TSTPNL, sdtm_lb_target: "LBCAT/LBSCAT", cdisc_core: Exp }
  plbid:
    description: Performing Laboratory ID.
    aliases: [PLBID]
    exact_mappings: [labtx:PLBID]
    annotations: { lab_tx_var: PLBID, lab_tx_group: "Test Level", sdtm_lb_target: "LBNAM (id)", cdisc_core: Perm }
  plbnam:
    description: Performing Laboratory Name.
    aliases: [PLBNAM]
    exact_mappings: [labtx:PLBNAM]
    annotations: { lab_tx_var: PLBNAM, sdtm_lb_target: LBNAM, cdisc_core: Exp }
  plbtyp:
    description: Performing Laboratory Type.
    aliases: [PLBTYP]
    exact_mappings: [labtx:PLBTYP]
    annotations: { lab_tx_var: PLBTYP, cdisc_core: Perm }
  labTestResults:
    description: The individual analyte results measured for this panel.
    range: LabTestResult
    multivalued: true
    inlined_as_list: true

  # ── LabTestResult (grain) ──
  plbtid:
    description: Performing Laboratory Test ID (vendor test code).
    aliases: [PLBTID]
    exact_mappings: [labtx:PLBTID]
    annotations: { lab_tx_var: PLBTID, lab_tx_group: "Test Level", sdtm_lb_target: "LBTESTCD (after mapping)", cdisc_core: Perm }
  plbtnm:
    description: Performing Laboratory Test Name.
    required: true
    aliases: [PLBTNM]
    exact_mappings: [labtx:PLBTNM]
    annotations: { lab_tx_var: PLBTNM, sdtm_lb_target: "LBTEST (after mapping)", cdisc_core: Req }
  plbtds:
    description: Performing Laboratory Test Description.
    aliases: [PLBTDS]
    exact_mappings: [labtx:PLBTDS]
    annotations: { lab_tx_var: PLBTDS, cdisc_core: Exp }
  plbtin:
    description: Performing Laboratory Test Information.
    aliases: [PLBTIN]
    exact_mappings: [labtx:PLBTIN]
    annotations: { lab_tx_var: PLBTIN, cdisc_core: Perm }
  plbtct:
    description: Performing Laboratory Test Category.
    aliases: [PLBTCT]
    exact_mappings: [labtx:PLBTCT]
    annotations: { lab_tx_var: PLBTCT, sdtm_lb_target: LBCAT, cdisc_core: Perm }
  dtrtid:
    description: Data Recipient Test ID.
    aliases: [DTRTID]
    exact_mappings: [labtx:DTRTID]
    annotations: { lab_tx_var: DTRTID, sdtm_lb_target: LBTESTCD, cdisc_core: Perm }
  dtrtnm:
    description: Data Recipient Test Name.
    aliases: [DTRTNM]
    exact_mappings: [labtx:DTRTNM]
    annotations: { lab_tx_var: DTRTNM, sdtm_lb_target: LBTEST, cdisc_core: Perm }
  dtrtct:
    description: Data Recipient Test Category.
    aliases: [DTRTCT]
    exact_mappings: [labtx:DTRTCT]
    annotations: { lab_tx_var: DTRTCT, sdtm_lb_target: LBCAT, cdisc_core: Perm }
  plbtts:
    description: Performing Laboratory Test Tracking Status.
    aliases: [PLBTTS]
    exact_mappings: [labtx:PLBTTS]
    annotations: { lab_tx_var: PLBTTS, sdtm_lb_target: LBSTAT, cdisc_core: Exp }
  plbttc:
    description: Performing Laboratory Test Tracking Status Code.
    range: ResultStatusEnum
    aliases: [PLBTTC]
    exact_mappings: [labtx:PLBTTC]
    annotations: { lab_tx_var: PLBTTC, sdtm_lb_target: "LBSTAT/LBREASND", cdisc_core: Perm }
  asydtc:
    description: Assay Date/Time.
    aliases: [ASYDTC]
    exact_mappings: [labtx:ASYDTC]
    annotations: { lab_tx_var: ASYDTC, sdtm_lb_target: "(LBDTC context)", cdisc_core: Exp }
  plrtrc:
    description: Perf Lab Reported Test Result Comment.
    aliases: [PLRTRC]
    exact_mappings: [labtx:PLRTRC]
    annotations: { lab_tx_var: PLRTRC, sdtm_lb_target: "CO/SUPPLB", cdisc_core: Perm }
  alrtlv:
    description: Alert Level (flag for clinically significant / out-of-range results).
    aliases: [ALRTLV]
    exact_mappings: [labtx:ALRTLV]
    annotations: { lab_tx_var: ALRTLV, sdtm_lb_target: "LBNRIND (informs)", cdisc_core: Exp }
  rrdtc:
    description: Reported Result Date/Time.
    aliases: [RRDTC]
    exact_mappings: [labtx:RRDTC]
    annotations: { lab_tx_var: RRDTC, cdisc_core: Perm }
  rtrtyp:
    description: Record Transaction Type.
    range: RecordTransactionTypeEnum
    aliases: [RTRTYP]
    exact_mappings: [labtx:RTRTYP]
    annotations: { lab_tx_var: RTRTYP, cdisc_core: Perm }
  specialization:
    description: >-
      The DatasetSpecialization this result instantiates. THIS REFERENCE IS THE
      USDM<->DTA LINKAGE: specialization.biomedicalConcept is the BC that a USDM
      Activity referenced via biomedicalConceptIds.
    range: DatasetSpecialization
    annotations: { linkage: "LabTestResult.specialization -> DatasetSpecialization.biomedicalConcept -> USDM Activity.biomedicalConceptIds" }
  results:
    description: 1..3 unit-system representations of this analyte's result.
    range: Result
    multivalued: true
    inlined_as_list: true
    required: true

  # ── Result (normalized unit block) ──
  unitSystem:
    description: Which unit system this Result is expressed in.
    range: UnitSystemEnum
    required: true
  charResult:
    description: Character result in this unit system.
    aliases: [PLRCRS, CVUCRS, SIUCRS]
    exact_mappings: [labtx:PLRCRS, labtx:CVUCRS, labtx:SIUCRS]
    annotations:
      lab_tx_var: "PLRCRS (ORIGINAL) / CVUCRS (CONVENTIONAL) / SIUCRS (SI)"
      lab_tx_group: "Result Level"
      sdtm_lb_target: "LBORRES (ORIGINAL) / LBSTRESC (CONVENTIONAL|SI)"
  numResult:
    description: Numeric result in this unit system.
    range: float
    aliases: [PLRNRS, CVUNRS, SIUNRS]
    exact_mappings: [labtx:PLRNRS, labtx:CVUNRS, labtx:SIUNRS]
    annotations:
      lab_tx_var: "PLRNRS / CVUNRS / SIUNRS"
      sdtm_lb_target: "LBORRES (ORIGINAL, char) / LBSTRESN (CONVENTIONAL|SI)"
  unit:
    description: Unit of measure for this Result.
    range: UnitEnum
    aliases: [PLRU, CVU, SIU]
    exact_mappings: [labtx:PLRU, labtx:CVU, labtx:SIU]
    annotations:
      lab_tx_var: "PLRU / CVU / SIU"
      sdtm_lb_target: "LBORRESU (ORIGINAL) / LBSTRESU (CONVENTIONAL|SI)"
  refRangeLow:
    description: Reference range lower limit in this unit system.
    aliases: [PLRRLO, CVURLO, SIURLO]
    exact_mappings: [labtx:PLRRLO, labtx:CVURLO, labtx:SIURLO]
    annotations:
      lab_tx_var: "PLRRLO / CVURLO / SIURLO"
      sdtm_lb_target: "LBORNRLO (ORIGINAL) / LBSTNRLO (CONVENTIONAL|SI)"
  refRangeHigh:
    description: Reference range upper limit in this unit system.
    aliases: [PLRRHI, CVURHI, SIURHI]
    exact_mappings: [labtx:PLRRHI, labtx:CVURHI, labtx:SIURHI]
    annotations:
      lab_tx_var: "PLRRHI / CVURHI / SIURHI"
      sdtm_lb_target: "LBORNRHI (ORIGINAL) / LBSTNRHI (CONVENTIONAL|SI)"
  refRangeDesc:
    description: Reference range description / textual range in this unit system.
    aliases: [PLRRRD, CVURRD, SIURRD]
    exact_mappings: [labtx:PLRRRD, labtx:CVURRD, labtx:SIURRD]
    annotations:
      lab_tx_var: "PLRRRD / CVURRD / SIURRD"
      sdtm_lb_target: "LBORNRIND/LBSTNRC context"
  refRangeType:
    description: Reference range type (e.g. NORMAL RANGE) in this unit system.
    range: ReferenceRangeTypeEnum
    aliases: [PLRRRT, CVURRT, SIURRT]
    exact_mappings: [labtx:PLRRRT, labtx:CVURRT, labtx:SIURRT]
    annotations:
      lab_tx_var: "PLRRRT / CVURRT / SIURRT"

# ──────────────────────────────────────────────────────────────────────────────
# ENUMS  (subsets of CDISC Controlled Terminology; source: NCI EVS evs-2026-Q1)
# ──────────────────────────────────────────────────────────────────────────────
enums:

  # ════════════════════════ AGREEMENT-LAYER ENUMS ════════════════════════

  BcFacetGroupEnum:
    description: Facet dimension of a BiomedicalConcept classification row.
    permissible_values:
      category:        { description: "Test grouping / panel membership (e.g. CBC, CMP, Lipid Panel)." }
      disease_area:    { description: Clinical / disease area the concept is relevant to. }
      is_used_by_form: { description: An EDC form that collects this concept. }
      is_used_by_dta:  { description: A Data Transfer Agreement this concept is in scope for (BC->DTA edge). }

  ProvenanceEnum:
    description: >-
      Field-level provenance: the KIND of source a value originated from, kept
      deliberately app-agnostic. "UI" denotes any human-facing data-entry interface
      (the specific application is recorded once at the agreement root via app_name,
      never here), so the vocabulary survives changes of UI tooling.
    permissible_values:
      USDM:       { description: Auto-populated from the upstream USDM protocol. }
      UI:         { description: Entered or edited by a human via a data-entry interface. }
      USDM + UI:  { description: "Prepopulated from USDM, then human-edited." }
      Derived:    { description: Computed or defaulted by the agreement generator. }

  OrganizationTypeEnum:
    description: Type of a party organization. Illustrative subset; extend as needed.
    permissible_values:
      Clinical Study Sponsor: { description: Study sponsor organization. }
      Manufacturer:           { description: Investigational product / device manufacturer. }
      Laboratory:             { description: Performing / central laboratory. }
      CRO:                    { description: Contract research organization. }

  DataExchangeRoleEnum:
    description: Direction of data exchange for a party.
    permissible_values:
      Data Provider:  { description: The party that sends the data (e.g. central lab). }
      Data Recipient: { description: The party that receives the data (e.g. sponsor). }

  FileFormatEnum:
    description: Transferred file format.
    permissible_values:
      XPT:       { description: SAS Transport (XPORT) file. }
      SAS 7bdat: { description: SAS dataset (sas7bdat). }
      CSV:       { description: Comma-separated values. }
      Txt:       { description: Delimited text. }
      JSON:      { description: JSON. }
      XLSX:      { description: Excel (OOXML). }
      XLS:       { description: Excel (legacy). }
      Parquet:   { description: Apache Parquet. }

  EncodingEnum:
    description: Character encoding of the transferred file.
    permissible_values:
      UTF8:  { description: UTF-8. }
      ASCII: { description: US-ASCII. }

  DelimiterEnum:
    description: Field delimiter (where applicable to the file format).
    permissible_values:
      Not Applicable: { description: No delimiter (non-delimited format). }
      Comma:          { description: Comma. }
      Tab:            { description: Tab. }
      Pipe:           { description: Pipe (|). }
      Semicolon:      { description: Semicolon. }

  TransmissionMethodEnum:
    description: Method by which the file is transmitted.
    permissible_values:
      sFTP:          { description: Secure FTP. }
      Secure Portal: { description: Web secure-transfer portal. }
      API:           { description: Programmatic API transfer. }
      Manual:        { description: Manual / out-of-band transfer. }

  TransferModeEnum:
    description: >-
      Whether each transmission carries the full dataset or only changes since the
      last. Distinct from the instance-layer TransmissionTypeEnum (file-level I/U/D).
    permissible_values:
      Cumulative:  { description: Each transfer contains the full cumulative dataset. }
      Incremental: { description: Each transfer contains only new/changed records. }

  TransferEnvironmentEnum:
    description: Environment the transfer targets.
    permissible_values:
      Development: { description: Development environment. }
      Test:        { description: Test / validation environment. }
      Production:  { description: Production environment. }

  BlindingEnum:
    description: Blinding status of the transferred data.
    permissible_values:
      Blinded:           { description: Fully blinded transfer. }
      Unblinded:         { description: Unblinded transfer. }
      Partially blinded: { description: Partially blinded transfer. }

  # ════════════════════════ INSTANCE / SEMANTIC-LAYER ENUMS ════════════════════════

  UnitSystemEnum:
    description: Internal key distinguishing the three LAB Tx unit blocks (not a CDISC codelist).
    permissible_values:
      ORIGINAL:    { description: As-reported by the performing lab (PLR* block). }
      CONVENTIONAL: { description: Conventional units (CVU* block). }
      SI:          { description: Système International units (SIU* block). }

  TransmissionTypeEnum:
    description: Transmission Type (LAB Tx TRSTYP). Subset; confirm against CDISC CT.
    permissible_values:
      I: { description: Initial transmission. }
      U: { description: Update transmission. }
      D: { description: Delete transmission. }

  RecordTransactionTypeEnum:
    description: Record Transaction Type (LAB Tx RTRTYP).
    permissible_values:
      I: { description: Insert. }
      U: { description: Update. }
      D: { description: Delete. }

  AdministrativeSexEnum:
    description: Administrative Sex. Bound to CDISC CT codelist SEX (C66731).
    permissible_values:
      M: { description: Male. }
      F: { description: Female. }
      U: { description: Unknown. }

  ResultStatusEnum:
    description: Test tracking status code (PLBTTC). Illustrative subset.
    permissible_values:
      RESULTS REPORTED:  { description: Result has been reported. }
      NOT DONE:          { description: Test not performed. }
      PENDING:           { description: Result pending. }

  ReferenceRangeTypeEnum:
    description: Reference range type. Illustrative subset.
    permissible_values:
      NORMAL RANGE:   { description: Standard normal reference range. }
      TOXICITY GRADE: { description: Toxicity-grade-based range. }

  UnitEnum:
    description: >-
      Unit of measure. Subset of CDISC CT codelist UNIT (C71620), source NCI EVS
      evs-2026-Q1. meaning CURIEs are NCIt C-codes.
    permissible_values:
      g/dL:    { description: Gram per Deciliter, meaning: ncit:C64783 }
      g/L:     { description: Gram per Liter (EVS-mapped), meaning: ncit:C42576 }
      mg/dL:   { description: Milligram per Deciliter, meaning: ncit:C67015 }
      "10^6/uL": { description: Million per Microliter (no EVS code in cache). }
      "10^12/L": { description: 10^12 per Liter, meaning: ncit:C67308 }
      "10^9/L":  { description: Billion per Liter, meaning: ncit:C67255 }
      "10^3/uL": { description: "Thousand per Microliter (no EVS code in cache)." }
      "%":     { description: Percentage, meaning: ncit:C25613 }
      fL:      { description: Femtoliter, meaning: ncit:C64780 }
      pg:      { description: Picogram, meaning: ncit:C64551 }
      U/L:     { description: "Enzyme Units per Liter (chemistry; no EVS code in cache)." }
      mmol/L:  { description: Millimole per Liter, meaning: ncit:C64387 }
      umol/L:  { description: Micromole per Liter, meaning: ncit:C64389 }
      ng/dL:   { description: "Nanogram per Deciliter (no EVS code in cache)." }

  LbTestCdEnum:
    description: >-
      Hematology subset of CDISC CT codelist LBTESTCD (C65047), source NCI EVS
      evs-2026-Q1. Used by Dataset Specializations / mappings, not directly on a
      DTA instance slot (the DTA carries vendor codes in PLBTID).
    permissible_values:
      HGB:  { description: Hemoglobin Measurement, meaning: ncit:C64848 }
      RBC:  { description: Erythrocyte Count, meaning: ncit:C51946 }
      WBC:  { description: Leukocyte Count, meaning: ncit:C51948 }
      HCT:  { description: Hematocrit Measurement, meaning: ncit:C64796 }
      PLAT: { description: Platelet Count, meaning: ncit:C51951 }
      MCV:  { description: Erythrocyte Mean Corpuscular Volume, meaning: ncit:C64799 }
      MCH:  { description: Erythrocyte Mean Corpuscular Hemoglobin, meaning: ncit:C64797 }
      MCHC: { description: Erythrocyte Mean Corpuscular Hemoglobin Concentration, meaning: ncit:C64798 }
