id: https://cdisc.org/dta2sdtm
name: dta_lab_transmission_model
title: DTA Logical Data Model
description: >-
  A logical data model (LDM) covering BOTH senses of "DTA" in the CDISC 360i lab
  flow. The token "DTA" is overloaded: the Data Transfer **Agreement** (the
  governance contract) vs. the lab Data **Transmission** payload (the data that
  fulfils it). This schema models both as related layers — contract vs.
  fulfilment — joined through the shared BiomedicalConcept hub. Three layers:

    * AGREEMENT LAYER — DataTransferAgreement > Study, DtaVersion, BcSelection,
      Party, TransferRequirements, VisitMapping, TimepointMapping, Source. The
      Data Transfer Agreement document, prepopulated from an upstream USDM
      protocol: WHAT data is promised, by whom, in what format, mapped to which
      visits. Slot names use snake_case so a serialized agreement payload
      validates directly with `-C DataTransferAgreement`.

    * SEMANTIC LAYER — BiomedicalConcept, DatasetSpecialization,
      VariableSpecialization. This is the linkage that connects an upstream USDM
      protocol (which references Biomedical Concepts on its Activities) to the
      downstream SDTM-LB dataset (which a Dataset Specialization projects each BC
      into). BiomedicalConcept now also carries a faceted `classifications` block
      (category / disease_area / is_used_by_form / is_used_by_dta), making the
      BC<->DTA membership an explicit, queryable edge.

    * INSTANCE LAYER — Transmission > Subject > Collection > Specimen > Panel >
      LabTestResult > Result. The actual nested transmission payload, normalized
      so the three parallel unit blocks (PLR*/CVU*/SIU*) collapse to one `Result`
      keyed by `unitSystem`.

  BiomedicalConcept is the hub joining all three layers: USDM references it
  (Activity.biomedicalConceptIds), the Agreement scopes it in (is_used_by_dta +
  BcSelection), and the payload delivers it
  (LabTestResult.specialization.biomedicalConcept) en route to SDTM-LB.

  Primary purpose: a typed *transformation source* for DTA -> SDTM-LB, kept
  traceable in both directions (USDM upstream, SDTM-LB downstream). Each instance
  slot carries `exact_mappings` to its LAB Transmission Model variable (identity)
  and `annotations.sdtm_lb_target` to its SDTM-LB variable (transformation
  target — deliberately NOT modeled as identity).

license: MIT
version: 0.1.0

# ──────────────────────────────────────────────────────────────────────────────
# PREFIXES — so every CURIE used below resolves to a real URI:
#   ncit:  enum `meaning` codelist bindings (NCI Thesaurus, e.g. ncit:C64848)
#   labtx: `exact_mappings` to LAB Transmission Model v2.0 variables (identity)
#   dta:   this schema's own namespace (default_prefix)
# ──────────────────────────────────────────────────────────────────────────────
prefixes:
  linkml: https://w3id.org/linkml/
  dta: https://cdisc.org/dta2sdtm/
  ncit: http://purl.obolibrary.org/obo/NCIT_
  labtx: https://wiki.cdisc.org/spaces/LAB2DOT0/pages/351701120/LAB+Transmission+Model+Metadata+Table#
default_prefix: dta
default_range: string
imports:
  - linkml:types

# ──────────────────────────────────────────────────────────────────────────────
# CLASSES
# ──────────────────────────────────────────────────────────────────────────────
classes:

  # ═══════════════════ AGREEMENT LAYER (the governance contract) ═══════════════════
  # The Data Transfer AGREEMENT document. Validate a serialized agreement with:
  #   linkml-validate -s dta.linkml.yaml -C DataTransferAgreement <agreement>.yaml

  DataTransferAgreement:
    description: >-
      The Data Transfer Agreement document: the governance contract that declares
      WHAT lab data will be transferred, by WHOM, in what FORMAT, mapped to which
      VISITS. Root of the agreement graph; the contract that a Transmission (the
      instance layer) later fulfils.
    slots:
      - app_name
      - source
      - study
      - dta_version
      - data_types
      - data_type_details
      - parties
      - transfer
      - visit_mapping
      - timepoint_mapping
    slot_usage:
      source:
        description: Provenance of the inputs the agreement was generated from.
        range: Source
        inlined: true
    annotations:
      fulfilled_by: "Transmission (instance layer) — agreement (promised) vs transmission (delivered)"

  Study:
    description: >-
      USDM-sourced study context prepopulated into the agreement. Read-only
      projection of the upstream USDM protocol.
    slots:
      - study_name
      - study_identifier
      - study_title
      - version_identifier
      - version_id
      - design_id
      - description
      - summary
    annotations:
      usdm_source: "Study / StudyVersion / StudyDesign"

  StudySummary:
    description: Roll-up counts of the USDM source the agreement was derived from.
    slots:
      - organizations
      - roles
      - assigned_persons
      - encounters
      - biomedical_concepts
      - bc_surrogates

  DtaVersion:
    description: One row of the DTA version history (document version number + date).
    slots:
      - version_number
      - version_date

  BcSelection:
    description: >-
      A biomedical concept SELECTED into the agreement scope (the `data_type_details`
      of an agreement). The agreement-side projection of a BiomedicalConcept: carries
      the NCI C-code, short name, and the faceted classification rows that backed the
      selection. Join to the canonical BiomedicalConcept on
      `bc_id` == BiomedicalConcept.nciCode.
    slots:
      - key
      - bc_id
      - short_name
      - facets
    annotations:
      joins_to: "BiomedicalConcept (bc_id -> nciCode) — agreement-scoped BC selection"

  Party:
    description: >-
      A party in the DTA signature table. Each carries its data-exchange role
      (Data Provider vs Data Recipient) and organization type.
    slots:
      - id
      - name
      - role
      - organization
      - organization_type
      - data_exchange_role
      - email
      - signature_date
      - source
    slot_usage:
      source:
        description: Field-level provenance of this party's data (USDM / UI / both).
        range: ProvenanceEnum

  TransferRequirements:
    description: >-
      The file-transfer mechanics agreed for the transmission: format, encoding,
      delimiter, method, cumulative/incremental, environment, blinding, and the
      provider/recipient folder names.
    slots:
      - file_name
      - file_format
      - encoding_system
      - delimiter
      - transmission_method
      - transmission_type
      - transfer_environment
      - transfer_blinding
      - folder_name_provider
      - folder_name_recipient

  VisitMapping:
    description: >-
      One row of the protocol<->data-provider visit crosswalk. Protocol visit
      number/name are USDM-locked; the data-provider values are authored by the lab.
      This crosswalk is what the DTA->SDTM transform uses to recover VISIT / VISITNUM
      (cf. Collection.visit / Collection.visitnum).
    slots:
      - protocol_visit_number
      - protocol_visit_name
      - data_provider_visit_number
      - data_provider_visit_name
      - source
    slot_usage:
      source:
        description: >-
          Field-level provenance of the row: protocol columns are USDM-locked and the
          data-provider columns are lab-authored, so a populated row is typically
          "USDM + UI".
        range: ProvenanceEnum
    annotations:
      sdtm_use: "recovers VISIT / VISITNUM; pairs with instance-layer Collection.visit/visitnum"

  TimepointMapping:
    description: >-
      One row of the optional protocol<->data-provider timepoint crosswalk. Omitted
      from the agreement when left blank.
    slots:
      - protocol_timepoint_number
      - protocol_timepoint_name
      - data_provider_timepoint_number
      - data_provider_timepoint_name
      - source
    slot_usage:
      source:
        description: Field-level provenance of the row (USDM / UI / both).
        range: ProvenanceEnum

  Source:
    description: >-
      Provenance of the inputs the agreement was generated from (source-control
      indication): the USDM protocol, the MVP metadata, and any DTA template.
    slots:
      - usdm
      - mvp
      - template

  # ════════════════════════ SEMANTIC LAYER (the linkage) ════════════════════════

  BiomedicalConcept:
    description: >-
      A CDISC Biomedical Concept (BC): a machine-readable definition of a clinical
      idea (e.g. "Hemoglobin Concentration in Blood"), independent of any dataset.
      USDM v4 references BCs from study Activities via `biomedicalConceptIds`; this
      class is the join target for that reference.
    slots:
      - conceptId
      - conceptName
      - nciCode
      - loincCodes
      - usdmReference
      - classifications
    annotations:
      usdm_entity: BiomedicalConcept
      usdm_link: "Activity.biomedicalConceptIds -> BiomedicalConcept.id"

  BcClassification:
    description: >-
      One faceted classification row for a BiomedicalConcept (from the MVP metadata
      lookup): a `group_name` (the facet dimension — category, disease_area,
      is_used_by_form, is_used_by_dta) plus its `value`. The `is_used_by_dta` facet
      is the explicit, queryable BC->DTA membership edge. Shared by
      BiomedicalConcept.classifications and BcSelection.facets.
    slots:
      - group_name
      - value
    annotations:
      mvp_source: "MVP metadata lookup rows (bc_id, group_name, value)"

  DatasetSpecialization:
    description: >-
      A CDISC SDTM Dataset Specialization (COSMoS): the projection of one
      BiomedicalConcept into a specific SDTM domain (here, LB), expressed as
      value-level metadata over a set of VariableSpecializations. This is the
      authoritative bridge: BC concept -> concrete SDTM-LB variables/codelists.
      System of record: cdisc-org/COSMoS export.
    slots:
      - specializationId
      - biomedicalConcept
      - vlmGroupId
      - domain
      - sdtmigStartVersion
      - packageDate
      - source
      - variableSpecializations
    annotations:
      cdisc_artifact: SDTM Dataset Specialization
      system_of_record: "cdisc-org/COSMoS export/cdisc_sdtm_dataset_specializations_latest.csv"

  VariableSpecialization:
    description: >-
      One value-level-metadata row of a DatasetSpecialization: how a single SDTM-LB
      variable is constrained for this concept (assigned term, codelist, value list,
      role, type, origin).
    slots:
      - sdtmVariable
      - role
      - assignedValue
      - codelistCode
      - codelistName
      - valueList
      - decId
      - dataType
      - mandatoryVariable
      - originType

  # ════════════════════════ INSTANCE LAYER (the DTA payload) ════════════════════

  Transmission:
    tree_root: true
    description: >-
      File-level / Good Transmission Practice (GTP) header. One per transmitted
      DTA file. Root of the instance graph.
    slots:
      - ltvrsn
      - igvrsn
      - fcrdtc
      - trssid
      - trstyp
      - subjects

  Subject:
    description: A trial subject within a transmission (study/site/subject identity).
    slots:
      - studyid
      - siteid
      - scrnid
      - asubjid
      - adsex
      - collections

  Collection:
    description: >-
      A specimen-collection event (LAB Tx "Visit Level": accession + kit). Groups
      the specimens drawn at one accession. `visit`/`visitnum` are derived
      conveniences, not part of the 60 LAB Tx variables.
    slots:
      - accsnid
      - kitid
      - kitdsc
      - visit
      - visitnum
      - specimens

  Specimen:
    description: A biological specimen received and tested by the performing lab.
    slots:
      - lddom
      - specid
      - rcvdtc
      - spcoml
      - spcomi
      - agespc
      - panels

  Panel:
    description: >-
      A test panel (e.g. HEMATOLOGY) plus the performing laboratory that ran it.
      Groups the individual analyte results.
    slots:
      - pnlid
      - tstpnl
      - plbid
      - plbnam
      - plbtyp
      - labTestResults

  LabTestResult:
    description: >-
      THE GRAIN: one measured analyte for one specimen. Carries the link to its
      DatasetSpecialization (`specialization`) — the join that closes the
      USDM<->DTA loop — plus 1..3 unit-system Results.
    slots:
      - plbtid
      - plbtnm
      - plbtds
      - plbtin
      - plbtct
      - dtrtid
      - dtrtnm
      - dtrtct
      - plbtts
      - plbttc
      - asydtc
      - plrtrc
      - alrtlv
      - rrdtc
      - rtrtyp
      - specialization
      - results

  Result:
    description: >-
      A result expressed in one unit system. The three parallel LAB Tx blocks
      (PLR* original / CVU* conventional / SIU* SI) are normalized here into ONE
      class keyed by `unitSystem`; the original variable names survive as aliases
      and exact_mappings on each slot.
    slots:
      - unitSystem
      - charResult
      - numResult
      - unit
      - refRangeLow
      - refRangeHigh
      - refRangeDesc
      - refRangeType

# ──────────────────────────────────────────────────────────────────────────────
# SLOTS
# ──────────────────────────────────────────────────────────────────────────────
slots:

  # ── agreement layer (DataTransferAgreement; slot names == agreement JSON keys) ──
  app_name:
    description: Identifier of the application/build that produced the agreement payload.
  study:
    description: USDM-sourced study context for the agreement.
    range: Study
    inlined: true
  dta_version:
    description: DTA document version (number + date).
    range: DtaVersion
    inlined: true
  data_types:
    description: Human-readable labels of the biomedical concepts selected into scope.
    multivalued: true
  data_type_details:
    description: The biomedical concepts selected into the agreement scope, with facets.
    range: BcSelection
    multivalued: true
    inlined_as_list: true
  parties:
    description: Parties included in the DTA signature table.
    range: Party
    multivalued: true
    inlined_as_list: true
  transfer:
    description: Agreed file-transfer mechanics.
    range: TransferRequirements
    inlined: true
  visit_mapping:
    description: Protocol<->data-provider visit crosswalk rows.
    range: VisitMapping
    multivalued: true
    inlined_as_list: true
  timepoint_mapping:
    description: Optional protocol<->data-provider timepoint crosswalk rows.
    range: TimepointMapping
    multivalued: true
    inlined_as_list: true

  # ── Study (agreement-side, USDM projection) ──
  study_name:
    description: USDM study name (e.g. NCT number).
  study_identifier:
    description: Study identifier (USDM StudyIdentifier).
  study_title:
    description: Study / protocol title.
  version_identifier:
    description: USDM study version identifier.
  version_id:
    description: USDM StudyVersion id.
  design_id:
    description: USDM StudyDesign id.
  description:
    description: Study description / synopsis.
  summary:
    description: Roll-up counts of the USDM source.
    range: StudySummary
    inlined: true

  # ── StudySummary ──
  organizations:    { description: Count of USDM organizations., range: integer }
  roles:            { description: Count of USDM study roles., range: integer }
  assigned_persons: { description: Count of assigned persons across roles., range: integer }
  encounters:       { description: Count of USDM encounters (visits)., range: integer }
  biomedical_concepts: { description: Count of USDM biomedical concepts., range: integer }
  bc_surrogates:    { description: Count of BC surrogates., range: integer }

  # ── DtaVersion ──
  version_number: { description: DTA document version number (e.g. 1.0). }
  version_date:   { description: DTA document version date (ISO 8601). }

  # ── BcSelection (data_type_details) ──
  key:
    description: Stable selection key ("<bc_id>||<short_name>") from the lookup.
  bc_id:
    description: NCI Thesaurus C-code of the concept (joins to BiomedicalConcept.nciCode).
  short_name:
    description: Concept short name (e.g. "Leukocyte Count").
  facets:
    description: The faceted classification rows backing this selection.
    range: BcClassification
    multivalued: true
    inlined_as_list: true

  # ── Party ──
  id:
    description: Stable party id (e.g. StudyRole_11_Person_8).
  name:
    description: Party person name (blank for organization-only rows).
  organization:
    description: Party organization name.
  organization_type:
    description: Type of the party organization.
    range: OrganizationTypeEnum
  data_exchange_role:
    description: Whether the party sends (Data Provider) or receives (Data Recipient).
    range: DataExchangeRoleEnum
  email:
    description: Party contact email.
  signature_date:
    description: Signature date for the party (ISO 8601).

  # ── TransferRequirements ──
  file_name:        { description: Transferred file base name. }
  file_format:      { description: File format., range: FileFormatEnum }
  encoding_system:  { description: Character encoding., range: EncodingEnum }
  delimiter:        { description: Field delimiter., range: DelimiterEnum }
  transmission_method: { description: Transmission method., range: TransmissionMethodEnum }
  transmission_type:   { description: Cumulative vs incremental transfer., range: TransferModeEnum }
  transfer_environment: { description: Target environment., range: TransferEnvironmentEnum }
  transfer_blinding:    { description: Blinding status of the transfer., range: BlindingEnum }
  folder_name_provider:  { description: Data Provider folder name. }
  folder_name_recipient: { description: Data Recipient folder name. }

  # ── VisitMapping / TimepointMapping ──
  protocol_visit_number:       { description: Protocol visit number (USDM-locked). }
  protocol_visit_name:         { description: Protocol visit name (USDM-locked). }
  data_provider_visit_number:  { description: Data-provider visit number (lab-authored). }
  data_provider_visit_name:    { description: Data-provider visit name (lab-authored). }
  protocol_timepoint_number:      { description: Protocol timepoint number. }
  protocol_timepoint_name:        { description: Protocol timepoint name. }
  data_provider_timepoint_number: { description: Data-provider timepoint number. }
  data_provider_timepoint_name:   { description: Data-provider timepoint name. }

  # ── Source ──
  usdm:     { description: USDM source label/filename. }
  mvp:      { description: MVP metadata source label/filename. }
  template: { description: DTA template source label/filename. }

  # ── BcClassification (shared facet row) ──
  group_name:
    description: Facet dimension of the classification.
    range: BcFacetGroupEnum
  value:
    description: Facet value within the group (e.g. "Complete Blood Count (CBC)").
  classifications:
    description: Faceted classification rows for this concept (incl. is_used_by_dta).
    range: BcClassification
    multivalued: true
    inlined_as_list: true

  # ── semantic layer ──
  conceptId:
    identifier: true
    description: BC identifier (e.g. USDM BiomedicalConcept_152, or COSMoS bc_id).
  conceptName:
    description: Human-readable concept name.
    required: true
  nciCode:
    description: NCI Thesaurus C-code for the concept.
  loincCodes:
    description: LOINC code(s) the concept may be identified by.
    multivalued: true
  usdmReference:
    description: The USDM BiomedicalConcept id this BC corresponds to in the source protocol.
    annotations:
      usdm_property: "Study.versions[].biomedicalConcepts[].id"

  specializationId:
    identifier: true
    description: Dataset specialization id (COSMoS vlm_group_id, e.g. HGBBLD).
  biomedicalConcept:
    description: The BiomedicalConcept this specialization projects into SDTM-LB.
    range: BiomedicalConcept
    inlined: true
    required: true
  vlmGroupId:
    description: COSMoS VLM group id.
  domain:
    description: SDTM domain the specialization targets.
    ifabsent: string(LB)
  sdtmigStartVersion:
    description: First SDTMIG version this specialization applies to (e.g. 3-2).
  packageDate:
    description: COSMoS package date of the vendored specialization.
  source:
    description: >-
      Source/provenance. On a DatasetSpecialization this is the system-of-record
      URL/citation; on a Party it is the field-provenance label (e.g. "USDM + UI").
      DataTransferAgreement overrides the range to the Source class via slot_usage.
  variableSpecializations:
    description: The value-level-metadata rows of this specialization.
    range: VariableSpecialization
    multivalued: true
    inlined_as_list: true

  sdtmVariable:
    description: SDTM-LB variable name constrained by this row (e.g. LBORRESU).
    required: true
  role:
    description: >-
      Role label. On a VariableSpecialization this is the SDTM role (Topic,
      Qualifier, Timing, ...); on a Party this is the study role (e.g. "Study Chair").
  assignedValue:
    description: Fixed/assigned value, if the specialization pins one (e.g. LBTESTCD=HGB).
  codelistCode:
    description: NCI C-code of the bound codelist (e.g. C71620 for UNIT).
  codelistName:
    description: Codelist submission name (e.g. UNIT, LBTESTCD).
  valueList:
    description: Permitted value list for this variable in this specialization.
    multivalued: true
  decId:
    description: COSMoS data element concept id (dec_id).
  dataType:
    description: Declared SDTM data type (text, float, ...).
  mandatoryVariable:
    description: Whether the specialization marks the variable mandatory.
    range: boolean
  originType:
    description: SDTM origin (Assigned, Collected, Derived, ...).

  # ── Transmission (GTP) ──
  ltvrsn:
    description: LAB Transmission Model Version.
    required: true
    aliases: [LTVRSN]
    exact_mappings: [labtx:LTVRSN]
    annotations: { lab_tx_var: LTVRSN, lab_tx_group: "Good Transmission Practice (GTP)", cdisc_core: Req, sdtm_lb_target: "(none — file metadata)" }
  igvrsn:
    description: SDTMIG Version.
    aliases: [IGVRSN]
    exact_mappings: [labtx:IGVRSN]
    annotations: { lab_tx_var: IGVRSN, cdisc_core: Perm, sdtm_lb_target: "(define-xml metadata)" }
  fcrdtc:
    description: File Creation Date/Time (ISO 8601).
    required: true
    aliases: [FCRDTC]
    exact_mappings: [labtx:FCRDTC]
    annotations: { lab_tx_var: FCRDTC, cdisc_core: Req, sdtm_lb_target: "(none)" }
  trssid:
    description: Transmission Source ID (the sending organization).
    required: true
    aliases: [TRSSID]
    exact_mappings: [labtx:TRSSID]
    annotations: { lab_tx_var: TRSSID, cdisc_core: Req, sdtm_lb_target: "(provenance)" }
  trstyp:
    description: Transmission Type.
    range: TransmissionTypeEnum
    aliases: [TRSTYP]
    exact_mappings: [labtx:TRSTYP]
    annotations: { lab_tx_var: TRSTYP, cdisc_core: Perm }
  subjects:
    description: The trial subjects carried in this transmission.
    range: Subject
    multivalued: true
    inlined_as_list: true

  # ── Subject ──
  studyid:
    description: Study Identifier.
    required: true
    aliases: [STUDYID]
    exact_mappings: [labtx:STUDYID]
    annotations: { lab_tx_var: STUDYID, lab_tx_group: "Study Level", sdtm_lb_target: STUDYID, usdm_property: "Study.versions[].studyIdentifiers", cdisc_core: Req }
  siteid:
    description: Study Site Identifier.
    aliases: [SITEID]
    exact_mappings: [labtx:SITEID]
    annotations: { lab_tx_var: SITEID, lab_tx_group: "Site Level", sdtm_lb_target: SITEID }
  scrnid:
    description: Screening ID.
    aliases: [SCRNID]
    exact_mappings: [labtx:SCRNID]
    annotations: { lab_tx_var: SCRNID, lab_tx_group: "Subject Level", cdisc_core: Perm }
  asubjid:
    description: Alternate Subject ID for the Study.
    aliases: [ASUBJID]
    exact_mappings: [labtx:ASUBJID]
    annotations: { lab_tx_var: ASUBJID, sdtm_lb_target: "USUBJID/SUBJID (after harmonization)", cdisc_core: Perm }
  adsex:
    description: Administrative Sex.
    range: AdministrativeSexEnum
    aliases: [ADSEX]
    exact_mappings: [labtx:ADSEX]
    annotations: { lab_tx_var: ADSEX, sdtm_lb_target: "(DM.SEX)", cdisc_core: Exp }
  collections:
    description: The specimen-collection events for this subject.
    range: Collection
    multivalued: true
    inlined_as_list: true

  # ── Collection (Visit Level) ──
  accsnid:
    description: Accession ID (the lab's identifier for the collection event).
    required: true
    aliases: [ACCSNID]
    exact_mappings: [labtx:ACCSNID]
    annotations: { lab_tx_var: ACCSNID, lab_tx_group: "Visit Level", sdtm_lb_target: "LBREFID/LBSPID", cdisc_core: Req }
  kitid:
    description: Kit ID.
    aliases: [KITID]
    exact_mappings: [labtx:KITID]
    annotations: { lab_tx_var: KITID, cdisc_core: Perm }
  kitdsc:
    description: Kit Description.
    aliases: [KITDSC]
    exact_mappings: [labtx:KITDSC]
    annotations: { lab_tx_var: KITDSC, cdisc_core: Exp }
  visit:
    description: Derived visit name (not a LAB Tx variable; SDTM convenience).
    annotations: { lab_tx_var: "(derived)", sdtm_lb_target: VISIT }
  visitnum:
    description: Derived visit number (not a LAB Tx variable; SDTM convenience).
    range: integer
    annotations: { lab_tx_var: "(derived)", sdtm_lb_target: VISITNUM }
  specimens:
    description: The biological specimens drawn at this collection event.
    range: Specimen
    multivalued: true
    inlined_as_list: true

  # ── Specimen ──
  lddom:
    description: Laboratory Data Domain.
    ifabsent: string(LB)
    aliases: [LDDOM]
