  rcvdtc:
    description: Specimen Receipt Date/Time.
    aliases: [RCVDTC]
    exact_mappings: [labtx:RCVDTC]
    annotations: { lab_tx_var: RCVDTC, sdtm_lb_target: "(supp/LBDTC context)", cdisc_core: Perm }
  spcoml:
    description: Specimen Comment From Lab.
    aliases: [SPCOML]
    exact_mappings: [labtx:SPCOML]
    annotations: { lab_tx_var: SPCOML, sdtm_lb_target: "CO/SUPPLB", cdisc_core: Perm }
  spcomi:
    description: Specimen Comment From Investigator.
    aliases: [SPCOMI]
    exact_mappings: [labtx:SPCOMI]
    annotations: { lab_tx_var: SPCOMI, sdtm_lb_target: "CO/SUPPLB", cdisc_core: Perm }
  agespc:
    description: Subject Age at Specimen Collection.
    range: integer
    aliases: [AGESPC]
    exact_mappings: [labtx:AGESPC]
    annotations: { lab_tx_var: AGESPC, sdtm_lb_target: "(DM.AGE context)", cdisc_core: Exp }
  panels:
    description: The test panels run on this specimen.
    range: Panel
    multivalued: true
    inlined_as_list: true

  # ── Panel + performing lab ──
  pnlid:
